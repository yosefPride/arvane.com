<!DOCTYPE html>
<html>
<head>
    <title>Basic Image Text Overlay</title>
    <style>
        body {
            margin: 0;
        }

        .container {
            position: relative;
            text-align: center;
            color: white;
        }

        .container img {
            width: 100%;
            height: auto;
        }

        .text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="latte-coffee-art-paint.jpg" alt="Image">
        <div class="text">Your Text Here</div>
    </div>

</body>
</html>
